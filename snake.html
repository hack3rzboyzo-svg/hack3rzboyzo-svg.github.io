<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake Collection</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #c9f0c9;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
  }
  h1 { font-size: 2rem; color: #4caf50; letter-spacing: 0.2em; margin-bottom: 0.3em; }
  .subtitle { font-size: 0.8rem; color: #555; margin-bottom: 2em; }
  .menu { display: flex; flex-direction: column; gap: 0.6em; width: 100%; max-width: 520px; }
  .menu-btn {
    display: flex; align-items: center; gap: 1em;
    background: #161b22; border: 1px solid #2a4a2a;
    border-radius: 8px; padding: 0.8em 1.2em; cursor: pointer;
    transition: border-color 0.15s, background 0.15s; text-align: left;
  }
  .menu-btn:hover { border-color: #4caf50; background: #0d2a0d; }
  .menu-btn .icon { font-size: 1.8rem; }
  .menu-btn .info { flex: 1; }
  .menu-btn .name { font-size: 1rem; font-weight: bold; color: #88d888; display: flex; align-items: center; gap: 0.5em; }
  .menu-btn .desc { font-size: 0.72rem; color: #556655; margin-top: 0.2em; }
  .badge {
    font-size: 0.6rem; border: 1px solid; border-radius: 3px;
    padding: 1px 5px; letter-spacing: 0.08em;
  }
  .badge-easy   { color: #4caf50; border-color: #2a5a2a; }
  .badge-fun    { color: #ffd700; border-color: #5a4a00; }
  .badge-medium { color: #4090ff; border-color: #1a3a7a; }
  .badge-hard   { color: #ff8c00; border-color: #7a3a00; }
  .badge-shoot  { color: #ff4444; border-color: #7a1a1a; }
  .arrow { color: #2a4a2a; font-size: 1.2rem; }
  .menu-btn:hover .arrow { color: #4caf50; }

  #game-wrapper { display: none; flex-direction: column; align-items: center; gap: 0.5em; }
  #game-title { font-size: 1.2rem; letter-spacing: 0.15em; }
  canvas { display: block; border: 1px solid #2a4a2a; border-radius: 4px; image-rendering: pixelated; cursor: crosshair; }
  .controls { font-size: 0.7rem; color: #3a5a3a; }
  #hud { font-size: 0.8rem; color: #667766; display: flex; gap: 1.5em; }
  #menu-back {
    margin-top: 0.4em;
    background: none; border: 1px solid #2a4a2a; color: #4caf50;
    padding: 0.4em 1.2em; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.85rem;
  }
  #menu-back:hover { background: #0d2a0d; }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu-screen">
  <h1>🐍 SNAKE COLLECTION</h1>
  <p class="subtitle">Five game modes. One legendary snake.</p>
  <div class="menu">
    <button class="menu-btn" onclick="startGame('classic')">
      <span class="icon">🐍</span>
      <div class="info">
        <div class="name">Classic <span class="badge badge-easy">EASY</span></div>
        <div class="desc">Standard snake — eat apples to grow. Don't hit a wall or yourself!</div>
      </div>
      <span class="arrow">▶</span>
    </button>
    <button class="menu-btn" onclick="startGame('golden')">
      <span class="icon">✨</span>
      <div class="info">
        <div class="name">Golden Mode <span class="badge badge-fun">FUN</span></div>
        <div class="desc">A wandering golden apple unlocks power mode — the whole board becomes food!</div>
      </div>
      <span class="arrow">▶</span>
    </button>
    <button class="menu-btn" onclick="startGame('maze-easy')">
      <span class="icon">🧩</span>
      <div class="info">
        <div class="name">Maze — Easy <span class="badge badge-medium">MEDIUM</span></div>
        <div class="desc">Navigate a sparse grid maze. Multiple apples spawn; a golden apple roams the corridors.</div>
      </div>
      <span class="arrow">▶</span>
    </button>
    <button class="menu-btn" onclick="startGame('maze-hard')">
      <span class="icon">🔥</span>
      <div class="info">
        <div class="name">Maze — Hard <span class="badge badge-hard">HARD</span></div>
        <div class="desc">Denser maze walls crowd every corner. Sharp reflexes and tight turns are essential.</div>
      </div>
      <span class="arrow">▶</span>
    </button>
    <button class="menu-btn" onclick="startGame('doom')">
      <span class="icon">💀</span>
      <div class="info">
        <div class="name">DOOM Mode <span class="badge badge-shoot">SHOOTER</span></div>
        <div class="desc">Move the snake with arrow keys, click to shoot enemies. Yellow = ammo drop, gold = damage boost.</div>
      </div>
      <span class="arrow">▶</span>
    </button>
  </div>
</div>

<!-- GAME -->
<div id="game-wrapper">
  <div id="game-title"></div>
  <div class="controls" id="game-controls"></div>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <button id="menu-back" onclick="goMenu()">← Menu</button>
</div>

<script>
// =============================================================================
// SHARED UTILITIES
// =============================================================================
const CELL = 10;
const POWER_DURATION = 10000;

function randCell(W, H) {
  return {
    x: Math.floor(Math.random() * (W / CELL)) * CELL,
    y: Math.floor(Math.random() * (H / CELL)) * CELL,
  };
}
function opposite(a, b) { return a.x === -b.x && a.y === -b.y; }
function dist(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// =============================================================================
// GAME STATE & ENGINE
// =============================================================================
let mode = null;
let state = {};
let loopId = null;
let rafId = null;
let lastTime = 0;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function goMenu() {
  clearInterval(loopId); loopId = null;
  cancelAnimationFrame(rafId); rafId = null;
  canvas.removeEventListener('mousedown', onMouseDown);
  window.removeEventListener('keydown', onKeyDown);
  document.getElementById('menu-screen').style.display = '';
  document.getElementById('game-wrapper').style.display = 'none';
  mode = null;
}

function startGame(m) {
  mode = m;
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('game-wrapper').style.display = 'flex';

  const titles = {
    'classic':   'CLASSIC',
    'golden':    'GOLDEN MODE',
    'maze-easy': 'MAZE — EASY',
    'maze-hard': 'MAZE — HARD',
    'doom':      'DOOM MODE',
  };
  const controls = {
    'classic':   'Arrow keys to move · R to restart',
    'golden':    'Arrow keys · Eat gold apple for power mode · R to restart',
    'maze-easy': 'Arrow keys · Avoid blue walls · R to restart',
    'maze-hard': 'Arrow keys · Avoid blue walls · R to restart',
    'doom':      'Arrow keys to move · Click to shoot · R to restart',
  };
  document.getElementById('game-title').textContent = titles[m];
  document.getElementById('game-controls').textContent = controls[m];

  if (m === 'doom') {
    canvas.width = 700; canvas.height = 500;
    state = createDoomState();
    canvas.style.cursor = 'crosshair';
    canvas.addEventListener('mousedown', onMouseDown);
    lastTime = performance.now();
    const doomLoop = () => {
      const now = performance.now();
      const dt = (now - lastTime) / 1000;
      lastTime = now;
      if (!state.gameOver) state = stepDoom(state, dt);
      drawDoom();
      updateHUD();
      rafId = requestAnimationFrame(doomLoop);
    };
    rafId = requestAnimationFrame(doomLoop);
  } else {
    canvas.width = 600; canvas.height = 400;
    canvas.style.cursor = 'default';
    resetSnakeGame();
    loopId = setInterval(snakeTick, 100);
  }

  window.addEventListener('keydown', onKeyDown);
}

function onKeyDown(e) {
  const dirs = {
    ArrowUp:    { x: 0, y: -CELL },
    ArrowDown:  { x: 0, y: CELL },
    ArrowLeft:  { x: -CELL, y: 0 },
    ArrowRight: { x: CELL, y: 0 },
  };
  const doomDirs = {
    ArrowUp:    { x: 0, y: -1 },
    ArrowDown:  { x: 0, y: 1 },
    ArrowLeft:  { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 },
  };
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();

  if (mode === 'doom') {
    if (doomDirs[e.key]) state.nextDir = doomDirs[e.key];
    if (e.key === 'r' || e.key === 'R') { state = createDoomState(); lastTime = performance.now(); }
  } else {
    if (dirs[e.key] && !opposite(dirs[e.key], state.direction)) state.direction = dirs[e.key];
    if (e.key === 'r' || e.key === 'R') resetSnakeGame();
  }
}

function onMouseDown(e) {
  if (mode !== 'doom') return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  state = shootDoom(state, mx, my);
}

// =============================================================================
// SNAKE GAMES (Classic / Golden / Maze)
// =============================================================================
function resetSnakeGame() {
  const W = canvas.width, H = canvas.height;
  const base = {
    snake: [{ x:100,y:100 },{ x:90,y:100 },{ x:80,y:100 }],
    direction: { x: CELL, y: 0 },
    score: 0,
    flash: 0,
    gameOver: false,
  };

  if (mode === 'classic') {
    state = { ...base, apple: randCell(W, H) };

  } else if (mode === 'golden') {
    state = {
      ...base,
      apple: randCell(W, H),
      golden: randCell(W, H),
      powerActive: false,
      powerStart: 0,
    };

  } else if (mode === 'maze-easy' || mode === 'maze-hard') {
    const spacing = mode === 'maze-easy' ? 6 : 4;
    const walls = makeMaze(W, H, spacing);
    const apples = [];
    for (let i = 0; i < 5; i++) {
      let a; do { a = randCell(W, H); } while (walls.has(key(a)));
      apples.push(a);
    }
    let golden; do { golden = randCell(W, H); } while (walls.has(key(golden)));
    state = {
      ...base,
      walls, apples, golden,
      goldTimer: performance.now(),
      powerActive: false,
      powerStart: 0,
    };
  }
}

function key(v) { return v.x + ',' + v.y; }

function makeMaze(W, H, spacing) {
  const walls = new Set();
  const cols = Math.floor(W / CELL);
  const rows = Math.floor(H / CELL);
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (r % spacing === 0 && c % spacing === 0)
        walls.add(c * CELL + ',' + r * CELL);
  return walls;
}

function snakeTick() {
  const W = canvas.width, H = canvas.height;
  if (state.gameOver) {
    state.flash = Math.max(0, state.flash - 1);
    if (state.flash === 0) resetSnakeGame();
    drawSnake();
    return;
  }

  const head = {
    x: state.snake[0].x + state.direction.x,
    y: state.snake[0].y + state.direction.y,
  };

  const outBounds = head.x < 0 || head.x >= W || head.y < 0 || head.y >= H;
  const selfHit = state.snake.some(s => s.x === head.x && s.y === head.y);
  const wallHit = state.walls ? state.walls.has(key(head)) : false;

  if (outBounds || selfHit || wallHit) {
    state.gameOver = true; state.flash = 20;
    drawSnake(); return;
  }

  state.snake.unshift(head);

  const now = performance.now();
  let ate = false;

  if (mode === 'classic') {
    if (head.x === state.apple.x && head.y === state.apple.y) {
      state.apple = randCell(W, H); ate = true; state.score++;
    }

  } else if (mode === 'golden') {
    if (state.powerActive && now - state.powerStart > POWER_DURATION) state.powerActive = false;
    if (head.x === state.apple.x && head.y === state.apple.y) {
      state.apple = randCell(W, H); ate = true; state.score++;
    }
    if (head.x === state.golden.x && head.y === state.golden.y) {
      state.powerActive = true; state.powerStart = now;
      state.golden = randCell(W, H); ate = true; state.score += 3;
    }
    if (state.powerActive && ((head.x/CELL + head.y/CELL) % 2 === 0)) ate = true;
    // drift golden apple
    const offs = [-CELL, 0, CELL];
    state.golden = {
      x: ((state.golden.x + offs[Math.floor(Math.random()*3)]) + W) % W,
      y: ((state.golden.y + offs[Math.floor(Math.random()*3)]) + H) % H,
    };

  } else if (mode === 'maze-easy' || mode === 'maze-hard') {
    if (state.powerActive && now - state.powerStart > POWER_DURATION) state.powerActive = false;
    // drift golden apple every 2.5s
    if (now - state.goldTimer > 2500) {
      state.goldTimer = now;
      const off5 = [-2*CELL,-CELL,0,CELL,2*CELL];
      state.golden = {
        x: clamp(state.golden.x + off5[Math.floor(Math.random()*5)], 0, W-CELL),
        y: clamp(state.golden.y + off5[Math.floor(Math.random()*5)], 0, H-CELL),
      };
    }
    const ai = state.apples.findIndex(a => a.x === head.x && a.y === head.y);
    if (ai !== -1) {
      state.apples.splice(ai, 1); ate = true; state.score++;
      if (state.apples.length < 5) {
        let na; do { na = randCell(W,H); } while(state.walls.has(key(na)));
        state.apples.push(na);
      }
    }
    if (head.x === state.golden.x && head.y === state.golden.y) {
      state.powerActive = true; state.powerStart = now; ate = true; state.score += 3;
    }
  }

  if (!ate) state.snake.pop();
  drawSnake();
  updateHUD();
}

function drawSnake() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = (mode === 'maze-easy' || mode === 'maze-hard') ? '#1a1a26' : '#000000';
  ctx.fillRect(0, 0, W, H);

  if (state.flash > 0 && state.flash % 2 === 0) {
    ctx.fillStyle = '#ffff00';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('YOU LOSE', W/2, H/2);
    return;
  }

  if (mode === 'golden' && state.powerActive) {
    const cols = Math.floor(W/CELL), rows = Math.floor(H/CELL);
    for (let r=0; r<rows; r++) for (let c=0; c<cols; c++)
      if ((c+r)%2===0) { ctx.fillStyle='rgba(200,0,0,0.3)'; ctx.fillRect(c*CELL,r*CELL,CELL,CELL); }
  }

  if (state.walls) {
    ctx.fillStyle = '#3296ff';
    for (const k of state.walls) {
      const [x,y] = k.split(',').map(Number);
      ctx.fillRect(x, y, CELL, CELL);
    }
  }

  if (state.apples) {
    ctx.fillStyle = '#c80000';
    for (const a of state.apples) ctx.fillRect(a.x, a.y, CELL, CELL);
  } else if (state.apple) {
    ctx.fillStyle = '#c80000';
    ctx.fillRect(state.apple.x, state.apple.y, CELL, CELL);
  }

  if (state.golden) {
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(state.golden.x, state.golden.y, CELL, CELL);
  }

  ctx.fillStyle = '#00c800';
  for (const s of state.snake) ctx.fillRect(s.x, s.y, CELL, CELL);

  ctx.fillStyle = '#aaa';
  ctx.font = '13px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('Score: ' + state.score, 6, 6);

  if ((mode === 'golden' || mode === 'maze-easy' || mode === 'maze-hard') && state.powerActive) {
    ctx.fillStyle = '#ffd700';
    ctx.textAlign = 'right';
    ctx.fillText('POWER MODE!', W - 6, 6);
  }
}

// =============================================================================
// DOOM MODE
// =============================================================================
const SNAKE_SZ = 10;
const MOVE_SPD = 0.15;

function getDoomWalls(W, H) {
  return [
    { x:0,     y:0,      w:W,   h:20 },
    { x:0,     y:H-20,   w:W,   h:20 },
    { x:0,     y:0,      w:20,  h:H  },
    { x:W-20,  y:0,      w:20,  h:H  },
    { x:200,   y:150,    w:Math.min(300,W*0.3), h:30 },
    { x:Math.min(600,W*0.65), y:200, w:30, h:200 },
    { x:300,   y:Math.min(400,H*0.6), w:Math.min(400,W*0.45), h:30 },
  ];
}

function wallHitDoom(x, y, walls, sz) {
  sz = sz || SNAKE_SZ;
  for (const w of walls)
    if (x+sz>w.x && x-sz<w.x+w.w && y+sz>w.y && y-sz<w.y+w.h) return true;
  return false;
}

function ptInWall(px, py, walls) {
  for (const w of walls)
    if (px>=w.x && px<=w.x+w.w && py>=w.y && py<=w.y+w.h) return true;
  return false;
}

function mkEnemy(W, H) {
  return {
    x: 80 + Math.random()*(W-160),
    y: 80 + Math.random()*(H-160),
    health: 30, maxHealth: 30, size: 20,
    isAmmoDrop: Math.random() < 0.25,
  };
}

function createDoomState() {
  const W = 700, H = 500;
  return {
    segments: [{ x: W/2, y: H/2 }],
    direction: { x:1, y:0 }, nextDir: { x:1, y:0 },
    health: 100, ammo: 300, baseDamage: 10,
    enemies: Array.from({length:5}, ()=>mkEnemy(W,H)),
    bullets: [], powerUps: [],
    kills: 0, spawnTimer: 0, moveCounter: 0,
    gameOver: false,
  };
}

function shootDoom(st, mx, my) {
  if (st.gameOver || st.ammo <= 0) return st;
  const hx = st.segments[0].x, hy = st.segments[0].y;
  const dx = mx-hx, dy = my-hy;
  const d = Math.sqrt(dx*dx+dy*dy);
  if (d === 0) return st;
  return {
    ...st,
    ammo: st.ammo - 1,
    bullets: [...st.bullets, {
      x: hx+(dx/d)*SNAKE_SZ, y: hy+(dy/d)*SNAKE_SZ,
      vx: (dx/d)*8, vy: (dy/d)*8,
      damage: st.baseDamage,
    }],
  };
}

function stepDoom(st, dt) {
  const W=700, H=500;
  const walls = getDoomWalls(W, H);
  let { segments, direction, nextDir, health, ammo, baseDamage,
        enemies, bullets, powerUps, kills, spawnTimer, moveCounter } = st;

  // Direction change
  if (!(nextDir.x===-direction.x && nextDir.y===-direction.y)) direction = nextDir;

  // Move snake
  moveCounter += MOVE_SPD;
  if (moveCounter >= 1) {
    moveCounter -= 1;
    const hx = segments[0].x, hy = segments[0].y;
    const nh = { x: hx+direction.x*SNAKE_SZ*2, y: hy+direction.y*SNAKE_SZ*2 };
    if (!wallHitDoom(nh.x, nh.y, walls)) {
      segments = [nh, ...segments];
      if (segments.length > 1) segments = segments.slice(0, segments.length-1);
    } else { health -= 1; }
  }

  const hx = segments[0].x, hy = segments[0].y;

  // Update enemies
  const updatedEnemies = [];
  for (const e of enemies) {
    const ddx=hx-e.x, ddy=hy-e.y;
    const d = Math.sqrt(ddx*ddx+ddy*ddy);
    let ex=e.x, ey=e.y;
    if (d>0) { ex+=ddx/d*2.5; ey+=ddy/d*2.5; }
    for (const w of walls) if (ptInWall(ex,ey,[w]) && d>0) { ex-=ddx/d*3; ey-=ddy/d*3; }

    if (e.health > 0) {
      updatedEnemies.push({ ...e, x:ex, y:ey });
    } else {
      kills++;
      health = Math.min(100, health + Math.ceil(health*0.1));
      updatedEnemies.push(mkEnemy(W, H));
      if (e.isAmmoDrop) { ammo += 10; }
      else if (Math.random() < 0.5) {
        powerUps = [...powerUps, { x:e.x, y:e.y, damage: Math.random()<0.5?2:3 }];
      }
    }
  }

  // Update bullets
  const newBullets = [];
  const finalEnemies = [...updatedEnemies];
  for (const b of bullets) {
    const bx=b.x+b.vx, by=b.y+b.vy;
    if (ptInWall(bx,by,walls)) continue;
    if (bx<0||bx>W||by<0||by>H) continue;
    let hit = false;
    for (let i=0; i<finalEnemies.length; i++) {
      if (dist({x:bx,y:by}, finalEnemies[i]) < finalEnemies[i].size) {
        finalEnemies[i] = { ...finalEnemies[i], health: finalEnemies[i].health - b.damage };
        if (segments.length>0) segments = [...segments, { ...segments[segments.length-1] }];
        hit=true; break;
      }
    }
    if (!hit) newBullets.push({ ...b, x:bx, y:by });
  }

  // Power-ups
  powerUps = powerUps.filter(pu => {
    if (dist({x:hx,y:hy}, pu) < SNAKE_SZ+15) { baseDamage+=pu.damage; return false; }
    return true;
  });

  // Head-enemy collision
  for (const e of finalEnemies)
    if (dist({x:hx,y:hy},e) < SNAKE_SZ+e.size) health--;

  // Body wrap kills
  if (kills >= 10) {
    for (const e of finalEnemies) {
      for (const seg of segments.slice(1)) {
        if (dist(seg, e) < SNAKE_SZ+e.size) { e.health-=5; break; }
      }
    }
  }

  // Self collision
  for (const seg of segments.slice(4))
    if (dist({x:hx,y:hy}, seg) < SNAKE_SZ*2) health-=5;

  // Spawn wave
  spawnTimer += dt;
  if (spawnTimer>=30 && kills>0) {
    for (let i=0;i<2*kills;i++) finalEnemies.push(mkEnemy(W,H));
    kills=0; spawnTimer=0;
  }

  return {
    ...st, segments, direction,
    health: Math.max(0, health), ammo, baseDamage,
    enemies: finalEnemies, bullets: newBullets, powerUps,
    kills, spawnTimer, moveCounter,
    gameOver: health<=0,
  };
}

function drawDoom() {
  const W=700, H=500;
  const walls = getDoomWalls(W, H);
  ctx.fillStyle='#141428'; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#1e1e3c'; ctx.lineWidth=1;
  for (let x=0;x<W;x+=10){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for (let y=0;y<H;y+=10){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Walls
  ctx.fillStyle='#646464';
  for (const w of walls) ctx.fillRect(w.x,w.y,w.w,w.h);

  // Enemies
  for (const e of state.enemies) {
    ctx.fillStyle = e.isAmmoDrop ? '#ffff00' : '#ff0000';
    ctx.fillRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size);
    const bx=e.x-20, by=e.y-e.size/2-10;
    ctx.fillStyle='#330000'; ctx.fillRect(bx,by,40,4);
    ctx.fillStyle='#00ff00'; ctx.fillRect(bx,by,40*(e.health/e.maxHealth),4);
  }

  // Bullets
  ctx.fillStyle='#ffff00';
  for (const b of state.bullets) {
    ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill();
  }

  // Power-ups
  for (const pu of state.powerUps) {
    ctx.fillStyle='#ffd700';
    ctx.fillRect(pu.x-8,pu.y-8,16,16);
    ctx.fillStyle='#000';
    ctx.font='12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('+'+pu.damage, pu.x, pu.y);
  }

  // Snake body
  for (let i=0;i<state.segments.length;i++) {
    const s=state.segments[i];
    const g=Math.max(0,200-i*5);
    ctx.fillStyle=`rgb(0,${g},0)`;
    ctx.fillRect(s.x-SNAKE_SZ/2,s.y-SNAKE_SZ/2,SNAKE_SZ,SNAKE_SZ);
  }
  // Snake head outline
  if (state.segments.length>0) {
    const h=state.segments[0];
    ctx.strokeStyle='#00ff00'; ctx.lineWidth=3;
    ctx.strokeRect(h.x-SNAKE_SZ/2-1,h.y-SNAKE_SZ/2-1,SNAKE_SZ+2,SNAKE_SZ+2);
    ctx.lineWidth=1;
  }

  // Game over overlay
  if (state.gameOver) {
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff3333'; ctx.font='bold 36px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('YOU DIED', W/2, H/2-20);
    ctx.fillStyle='#aaa'; ctx.font='18px monospace';
    ctx.fillText('Press R to restart', W/2, H/2+24);
  }
}

// =============================================================================
// HUD
// =============================================================================
function updateHUD() {
  const hud = document.getElementById('hud');
  if (mode === 'doom') {
    const s = state;
    hud.innerHTML =
      `<span>HP: <span style="color:${s.health>30?'#00ff00':'#ff4444'}">${s.health}</span></span>` +
      `<span>AMMO: <span style="color:#ffd700">${s.ammo}</span></span>` +
      `<span>DMG: <span style="color:#ccc">${s.baseDamage}</span></span>` +
      `<span>ENEMIES: <span style="color:#ff6666">${s.enemies.length}</span></span>`;
  } else {
    hud.innerHTML = `<span>Score: <span style="color:#88d888">${state.score}</span></span>`;
  }
}
</script>
